<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - FlowSmart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <img src="assets/img/logo.svg" alt="FlowSmart" class="auth-logo">
        <h1>Create your account</h1>
        <p>Start managing your business finances smarter</p>
      </div>

      <form id="registerForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" class="form-input" placeholder="John Doe">
          <span class="form-error" id="nameError"></span>
        </div>

        <div class="form-group">
          <label for="businessName">Business name <span style="color:var(--color-text-muted); font-weight:400;">(optional)</span></label>
          <input type="text" id="businessName" name="businessName" class="form-input" placeholder="Acme Ltd.">
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@business.com">
          <span class="form-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="password" name="password" class="form-input"
                   placeholder="Minimum 8 characters">
            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <span class="form-error" id="passwordError"></span>
          <div class="password-strength">
            <div class="strength-bar" id="strengthBar"></div>
            <span class="strength-text" id="strengthText"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" class="form-input"
                 placeholder="Re-enter your password">
          <span class="form-error" id="confirmPasswordError"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
          <span class="btn-text">Create account</span>
          <span class="btn-loader hidden">
            <svg class="spinner" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" fill="none" stroke-width="2.5"></circle>
            </svg>
          </span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>

  <script src="assets/js/core/api.js"></script>
  <script src="assets/js/core/state.js"></script>
  <script src="assets/js/core/auth.js"></script>
  <script src="assets/js/components/toast.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => FlowSmart.init());
  </script>
</body>
</html>
