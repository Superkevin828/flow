<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - FlowSmart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/pages/auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <img src="assets/img/logo.svg" alt="FlowSmart" class="auth-logo">
        <h1>Welcome back</h1>
        <p>Sign in to manage your business finances</p>
      </div>
      
      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" required 
                 placeholder="you@business.com" autocomplete="email">
          <span class="form-error" id="emailError"></span>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="password" name="password" required 
                   placeholder="Enter your password" autocomplete="current-password">
            <button type="button" class="toggle-password" aria-label="Toggle password visibility">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <span class="form-error" id="passwordError"></span>
        </div>
        
        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember">
            <span>Remember me</span>
          </label>
          <a href="#" class="forgot-password">Forgot password?</a>
        </div>
        
        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          <span class="btn-text">Sign in</span>
          <span class="btn-loader hidden">
            <svg class="spinner" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" fill="none" stroke-width="2.5"></circle>
            </svg>
          </span>
        </button>
      </form>
      
      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Sign up</a></p>
      </div>
      
      <div class="auth-separator">
        <span>or</span>
      </div>
      
      <div class="demo-info">
        <p>Want to try it out?</p>
        <button class="btn btn-secondary btn-full" id="demoLoginBtn">
          Try Demo Account
        </button>
      </div>
    </div>
  </div>
  
  <script src="assets/js/core/state.js"></script>
  <script src="assets/js/core/utils.js"></script>
  <script src="assets/js/core/api.js"></script>
  <script src="assets/js/core/auth.js"></script>
  <script src="assets/js/components/toast.js"></script>
  <script src="assets/js/pages/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      AuthPage.init();
    });
  </script>
</body>
</html>
